name: CI

on:
  push:
    branches:
      - main
    paths:
      - "events-api/**"
      - ".github/workflows/ci.yml"
      - ".github/workflows/deploy.yml"
  pull_request:
    branches:
      - main
    paths:
      - "events-api/**"
      - ".github/workflows/ci.yml"
      - ".github/workflows/deploy.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: "events-api/requirements.txt"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r ./events-api/requirements.txt

      - name: Build Docker image
        run: |
          docker build -t events-api:${{ github.sha }} ./events-api